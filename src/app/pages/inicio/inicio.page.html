<ion-header [translucent]="true">
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Inicio</ion-title>
    </ion-toolbar>
  </ion-header>

</ion-content>

<ion-tab-bar slot="bottom">

  <ion-tab-button class="selecionado" tab="inicio" routerLink="/inicio">
    <ion-icon name="home-outline"></ion-icon>
    <ion-label>Inicio</ion-label>
  </ion-tab-button>

  <ion-tab-button tab="sala" routerLink="/sala">
    <ion-icon name="business-outline"></ion-icon>
    <ion-label>Salas</ion-label>
  </ion-tab-button>

  <ion-tab-button tab="ranking" routerLink="/ranking">
    <ion-icon name="trophy-outline"></ion-icon>
    <ion-label>Ranking</ion-label>

  <ion-tab-button tab="perfil" routerLink="/perfil">
