<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Perfil</ion-title>
    <ion-buttons slot="end">
      <ion-button class="editar-btn" (click)="editarPerfil()">
        <ion-icon name="pencil-outline" slot="start"></ion-icon>
        Editar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <ion-card class="perfil-card">
    <ion-card-content>

      <div class="avatar">
        <span>{{ iniciais }}</span>
      </div>

      <h2 class="perfil-nome">{{ usuario.nome }}</h2>
      <p class="perfil-app">EscolaSync</p>

    </ion-card-content>
  </ion-card>
</ion-content>

<ion-tab-bar slot="bottom">

  <ion-tab-button tab="inicio" routerLink="/inicio">
    <ion-icon name="home-outline"></ion-icon>
    <ion-label>Inicio</ion-label>
  </ion-tab-button>

  <ion-tab-button tab="sala" routerLink="/sala">
    <ion-icon name="business-outline"></ion-icon>
    <ion-label>Salas</ion-label>
  </ion-tab-button>

  <ion-tab-button tab="ranking" routerLink="/ranking">
    <ion-icon name="trophy-outline"></ion-icon>
    <ion-label>Ranking</ion-label>
  </ion-tab-button>

  <ion-tab-button class="selecionado" tab="perfil" routerLink="/perfil">
    <ion-icon name="person-outline"></ion-icon>
    <ion-label>Perfil</ion-label>
  </ion-tab-button>

</ion-tab-bar>
